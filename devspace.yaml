version: v2beta1

# NOTE: Bootstrap main may deploy OrganizationsService as "tenants"; prefer label
# selectors so DevSpace works against either naming until bootstrap#378 merges.
vars:
  ORGANIZATIONS_NAMESPACE: platform
  E2E_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application organizations -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for organizations..."
      kubectl patch application organizations -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'organizations' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application organizations -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for organizations..."
      kubectl patch application organizations -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'organizations' not found in argocd namespace."
    fi
  patch_deployment: |-
    echo "Patching organizations deployment for DevSpace..."
    deployment_name=$(kubectl get deployments -n ${ORGANIZATIONS_NAMESPACE} \
      -l 'app.kubernetes.io/name=organizations' \
      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
    if [[ -z "${deployment_name}" ]]; then
      deployment_name=$(kubectl get deployments -n ${ORGANIZATIONS_NAMESPACE} \
        -l 'app.kubernetes.io/name=tenants' \
        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
    fi
    if [[ -z "${deployment_name}" ]]; then
      echo "ERROR: organizations deployment not found in ${ORGANIZATIONS_NAMESPACE}" >&2
      exit 1
    fi
    kubectl patch deployment "${deployment_name}" -n ${ORGANIZATIONS_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: organizations
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with E2E_IMAGE
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api --path agynio/api/organizations/v1 --path agynio/api/authorization/v1 --path agynio/api/identity/v1
                  exec go run ./cmd/organizations-service
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"

deployments:
  e2e-runner:
    namespace: ${ORGANIZATIONS_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: ORGANIZATIONS_ADDR
                value: "organizations:50051"
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: e2e-data
        volumes:
          - name: e2e-data
            emptyDir: {}
        labels:
          app.kubernetes.io/name: organizations-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace organizations
      else
        start_dev --disable-pod-replace organizations
        echo "Waiting for organizations to be healthy on :50051..."
        healthy=false
        for i in $(seq 1 60); do
        if exec_container --label-selector=app.kubernetes.io/name=organizations -n ${ORGANIZATIONS_NAMESPACE} -- bash -c 'nc -z localhost 50051 >/dev/null 2>&1 || (echo > /dev/tcp/localhost/50051) >/dev/null 2>&1'; then
            healthy=true
            break
          fi
          sleep 2
        done
        if [ "$healthy" != "true" ]; then
          echo "ERROR: Organizations did not become healthy within 120s" >&2
          exit 1
        fi
        echo "Dev environment ready. Stopping dev session."
        stop_dev organizations
      fi

  test-e2e:
    run: |-
      disable_argocd_sync

      deployment_name=$(kubectl get deployments -n ${ORGANIZATIONS_NAMESPACE} \
        -l 'app.kubernetes.io/name=organizations' \
        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
      if [[ -z "${deployment_name}" ]]; then
        deployment_name=$(kubectl get deployments -n ${ORGANIZATIONS_NAMESPACE} \
          -l 'app.kubernetes.io/name=tenants' \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
      fi
      if [[ -z "${deployment_name}" ]]; then
        echo "ERROR: organizations deployment not found in ${ORGANIZATIONS_NAMESPACE}" >&2
        exit 1
      fi

      # Update the deployment to use the freshly-built image (built and loaded in CI)
      kubectl set image "deployment/${deployment_name}" organizations=ghcr.io/agynio/organizations:e2e-test -n ${ORGANIZATIONS_NAMESPACE}
      kubectl rollout status "deployment/${deployment_name}" -n ${ORGANIZATIONS_NAMESPACE} --timeout=120s

      create_deployments e2e-runner
      start_dev e2e-runner &

      echo "Waiting for sync to complete..."
      SYNC_READY=false
      for i in $(seq 1 60); do
        if exec_container \
          --label-selector "app.kubernetes.io/name=organizations-e2e" \
          -n ${ORGANIZATIONS_NAMESPACE} \
          -- test -f /opt/app/data/go.mod 2>/dev/null; then
          SYNC_READY=true
          break
        fi
        sleep 2
      done

      if [ "$SYNC_READY" != "true" ]; then
        echo "ERROR: sync did not complete within 120s" >&2
        stop_dev e2e-runner || true
        purge_deployments e2e-runner || true
        exit 1
      fi

      echo "Sync complete. Running e2e tests..."
      exec_container \
        --label-selector "app.kubernetes.io/name=organizations-e2e" \
        -n ${ORGANIZATIONS_NAMESPACE} \
        -- bash -c '
          set -eu
          cd /opt/app/data
          buf generate buf.build/agynio/api --path agynio/api/organizations/v1 --path agynio/api/authorization/v1 --path agynio/api/identity/v1
          go test -v -count=1 -tags e2e ./test/e2e/
        '
      EXIT_CODE=$?
      stop_dev e2e-runner
      purge_deployments e2e-runner
      exit $EXIT_CODE

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:organizations
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  organizations:
    namespace: ${ORGANIZATIONS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: organizations
    containers:
      organizations:
        container: organizations
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "50051"

  e2e-runner:
    namespace: ${ORGANIZATIONS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: organizations-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/
          - /bootstrap/
