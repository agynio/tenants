name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Generate protobuf bindings
        run: buf generate buf.build/agynio/api --path agynio/api/organizations/v1 --path agynio/api/authorization/v1

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...

  e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout organizations
        uses: actions/checkout@v4

      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          repository: agynio/bootstrap
          path: bootstrap

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.34.3

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Install DevSpace
        run: |
          curl -sSL https://github.com/devspace-sh/devspace/releases/latest/download/devspace-linux-amd64 -o /tmp/devspace
          sudo install -m 0755 /tmp/devspace /usr/local/bin/devspace
          devspace version

      - name: Provision cluster
        run: ./apply.sh -y
        working-directory: bootstrap

      - name: Verify platform workloads and Argo CD health
        run: ./.github/scripts/verify_platform_health.sh
        working-directory: bootstrap

      - name: Set kubeconfig
        run: echo "KUBECONFIG=$GITHUB_WORKSPACE/bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Build e2e test image
        run: docker build -t ghcr.io/agynio/organizations:e2e-test .

      - name: Import image into k3d
        run: k3d image import ghcr.io/agynio/organizations:e2e-test --cluster agyn-local

      - name: Run e2e tests
        run: devspace run test-e2e
